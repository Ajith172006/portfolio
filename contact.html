<section id="contact">
  <div class="container">
    <div class="contact-box reveal">
      <div class="section-label" style="justify-content:center; margin-bottom:1rem;">Contact</div>
      <div class="contact-title">Let's Build Something<br /><span style="background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">Together</span></div>
      <p class="contact-desc">I'm actively looking for full stack developer roles. Have a project or opportunity? Send me a quick message below.</p>
      <form id="contact-form" class="contact-form">
        <div class="form-row">
          <label>
            Your Email
            <input type="email" name="from_email" placeholder="your@email.com" required />
          </label>
        </div>
        <div class="form-row">
          <label>
            Subject
            <input type="text" name="subject" placeholder="Project name or question" required />
          </label>
        </div>
        <div class="form-row">
          <label>
            Message
            <textarea name="message" rows="6" placeholder="Describe your idea or opportunity" required></textarea>
          </label>
        </div>
        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
      <p id="form-status" class="contact-note"></p>
      <div class="contact-info">
        <a href="mailto:ajithselvam596@gmail.com" class="contact-link">✉ ajithselvam596@gmail.com</a>
      </div>
    </div>
  </div>
</section>
